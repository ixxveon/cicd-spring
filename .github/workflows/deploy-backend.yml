name: Spring Boot Deploy via SSM

on:
  push:
    branches: ["master"]

jobs: 
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write 
      contents: read 
    
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Deploy JAR to S3
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain)
          aws s3 cp "$JAR_FILE" s3://${{ secrets.BACKEND_BUCKET }}/app.jar

      # - name: Deploy via SSM
      #   run: |
      #     aws ssm send-command \
      #       --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
      #       --document-name "AWS-RunShellScript" \
      #       --parameters commands="[
      #         \"aws s3 cp s3://${{ secrets.BACKEND_BUCKET }}/app.jar /home/ec2-user/app/app.jar\",
      #         \"bash /home/ec2-user/app/deploy.sh\"
      #       ]"
      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws s3 cp s3://${{ secrets.BACKEND_BUCKET }}/app.jar /home/ec2-user/app/app.jar\",
              \"bash /home/ec2-user/app/deploy.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "CommandId=$COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
          
      - name: Wait for SSM execution
        run: sleep 10

      - name: Get SSM Result
        run: |
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}